<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Класс D&D 5e — Истинное предназначение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #3a2e28 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(#noise)" opacity="0.08"/></svg>');

            background-color: #3a2e28;
            font-family: 'Palatino', 'Book Antiqua', 'Georgia', serif;
            color: #e4d5b7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .main-container {
            max-width: 700px;
            width: 100%;
            background: rgba(42, 34, 27, 0.85);
            backdrop-filter: blur(6px);
            border: 2px solid #6b5a4b;
            box-shadow: 0 0 30px rgba(0,0,0,0.7), inset 0 0 20px rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 30px 25px;
            position: relative;
        }
        h1 {
            text-align: center;
            font-size: 2.4rem;
            letter-spacing: 2px;
            color: #cfb991;
            text-shadow: 2px 2px 4px #000000;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            font-style: italic;
            color: #b3a68c;
            margin-bottom: 25px;
            font-size: 1rem;
            border-bottom: 1px dashed #6b5a4b;
            padding-bottom: 15px;
        }
        .question-area {
            background: rgba(62, 48, 36, 0.7);
            border: 1px solid #8b7a64;
            border-radius: 8px;
            padding: 20px;
            margin: 15px 0;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
        }
        .question-text {
            font-size: 1.3rem;
            margin-bottom: 18px;
            font-weight: bold;
            color: #ebdbbd;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option {
            background: #554533;
            border: 1px solid #7a6a54;
            color: #f0e2c5;
            padding: 12px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
        }
        .option:hover {
            background: #6b5a43;
            border-color: #b49b6b;
            transform: translateX(5px);
            box-shadow: 0 0 10px rgba(207, 185, 145, 0.4);
        }
        .option.selected {
            background: #7a6248;
            border-color: #c9a96e;
            box-shadow: 0 0 12px #c9a96e;
            color: #ffefcf;
        }
        .option-letter {
            display: inline-block;
            width: 28px;
            height: 28px;
            background: #2e241c;
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            font-weight: bold;
            color: #d4b47c;
            flex-shrink: 0;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        button {
            background: #5e4b37;
            border: 1px solid #8b775b;
            color: #f5e7d3;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            letter-spacing: 1px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        button:hover {
            background: #7a6349;
            border-color: #cbb07c;
            box-shadow: 0 0 12px #b49455;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        .result-container {
            display: none;
            margin-top: 25px;
            background: rgba(30, 23, 17, 0.8);
            border: 2px solid #9e8b6f;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        .class-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 10px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            border: 2px solid #b49455;
            image-rendering: pixelated;
        }
        .pixel-cell {
            background: transparent;
        }
        .class-name {
            font-size: 2rem;
            color: #e6c875;
            text-shadow: 2px 2px 3px black;
        }
        .subclass-name {
            font-size: 1.4rem;
            color: #c5ad7a;
            margin: 5px 0;
        }
        .psychotype {
            font-style: italic;
            color: #baa88b;
        }
        .restart-link {
            display: inline-block;
            margin-top: 15px;
            color: #d1b886;
            text-decoration: underline;
            cursor: pointer;
        }
        .progress {
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: #9a8b78;
        }
        .hidden {
            display: none;
        }
        .multiple-classes {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        .multiple-classes button {
            background: #4d3e2e;
        }
    </style>
</head>
<body>
<div class="main-container">
    <h1>⚔️ Истинный Класс 🛡️</h1>
    <div class="subtitle">Испытание души для героев D&D 5e</div>

    <div id="quizArea">
        <div class="progress" id="progressIndicator">Вопрос 1 / 41</div>
        <div class="question-area" id="questionContainer"></div>
        <div class="nav-buttons">
            <button id="prevBtn" disabled>◀ Предыдущий</button>
            <button id="nextBtn">Следующий ▶</button>
        </div>
    </div>

    <div class="result-container" id="resultContainer">
        <div id="classIcon"></div>
        <div class="class-name" id="classNameDisplay"></div>
        <div class="subclass-name" id="subclassDisplay"></div>
        <div class="psychotype" id="psychotypeDisplay"></div>
        <div style="margin-top:10px;" id="tiebreakerArea"></div>
        <div class="restart-link" id="restartBtn">🔄 Пройти испытание заново</div>
    </div>
</div>

            }
        }
        function playClick() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // color mapping: 1=#bca37c, 2=#d4af37, 3=#6b8e23, 4=#8b0000, 5=#b8860b, 6=#5f9ea0, 7=#228b22, 8=#daa520, 9=#2f4f4f, a=#8b4513, b=#4b0082, c=#c0c0c0, d=#1a1a1a, e=#556b2f, f=#800080 etc.
        const colorMap = {
            '1':'#bca37c','2':'#d4af37','3':'#6b8e23','4':'#8b0000','5':'#b8860b','6':'#5f9ea0','7':'#228b22','8':'#daa520','9':'#2f4f4f','a':'#8b4513','b':'#4b0082','c':'#c0c0c0','d':'#1a1a1a','e':'#556b2f','f':'#800080'
        };

        function createPixelIcon(className) {
            const pattern = pixelPatterns[className] || pixelPatterns["Воин"];
            const container = document.createElement('div');
            container.className = 'class-icon';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'pixel-cell';
                    const ch = pattern[row][col];
                    if (ch !== '.' && colorMap[ch]) {
                        cell.style.backgroundColor = colorMap[ch];
                    }
                    container.appendChild(cell);
                }
            }
            return container;
        }

        // ---------- STATE ----------
        let currentQuestionIndex = 0; // 0..40 (0-29: class, 30-39: subclass, 40: joke)
        const totalQuestions = 41;
        let answers = new Array(totalQuestions).fill(null); // stores selected option key (letter)
        let selectedClass = null; // final class after tiebreaker
        let classScores = {};
        let subclassKeys = [];

        // DOM elements
        const questionContainer = document.getElementById('questionContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressIndicator = document.getElementById('progressIndicator');
        const quizArea = document.getElementById('quizArea');
        const resultContainer = document.getElementById('resultContainer');
        const classIconDiv = document.getElementById('classIcon');
        const classNameDisplay = document.getElementById('classNameDisplay');
        const subclassDisplay = document.getElementById('subclassDisplay');
        const psychotypeDisplay = document.getElementById('psychotypeDisplay');
        const tiebreakerArea = document.getElementById('tiebreakerArea');
        const restartBtn = document.getElementById('restartBtn');

        // ---------- FUNCTIONS ----------
        function renderQuestion() {
            if (currentQuestionIndex >= totalQuestions) {
                showResults();
                return;
            }
            const qData = getQuestionData(currentQuestionIndex);
            questionContainer.innerHTML = '';
            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.textContent = qData.text;
            questionContainer.appendChild(qText);

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            const keys = Object.keys(qData.options);
            keys.forEach(key => {
                const opt = qData.options[key];
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                if (answers[currentQuestionIndex] === key) optDiv.classList.add('selected');
                const letterSpan = document.createElement('span');
                letterSpan.className = 'option-letter';
                letterSpan.textContent = key.toUpperCase();
                optDiv.appendChild(letterSpan);
                const textSpan = document.createElement('span');
                textSpan.textContent = opt.text || opt; // for joke question it's just string
                optDiv.appendChild(textSpan);
                optDiv.addEventListener('click', (e) => {
                    initAudio();
                    playClick();
                    answers[currentQuestionIndex] = key;
                    renderQuestion();
                });
                optionsDiv.appendChild(optDiv);
            });
            questionContainer.appendChild(optionsDiv);
            progressIndicator.textContent = `Вопрос ${currentQuestionIndex+1} / ${totalQuestions}`;
            prevBtn.disabled = (currentQuestionIndex === 0);
            if (currentQuestionIndex === totalQuestions-1) {
                nextBtn.textContent = 'Завершить ✦';
            } else {
                nextBtn.textContent = 'Следующий ▶';
            }
        }

        function getQuestionData(index) {
            if (index < 30) return questions1_30[index];
            if (index < 40) return questions31_40[index-30];
            return question41;
        }

        function calculateClassScores() {
            const scores = {};
            classNames.forEach(c => scores[c] = 0);
            for (let i = 0; i < 30; i++) {
                const ans = answers[i];
                if (!ans) continue;
                const q = questions1_30[i];
                const classes = q.options[ans].classes;
                classes.forEach(cls => scores[cls]++);
            }
            return scores;
        }

        function getDominantPsychotype() {
            const counts = {};
            for (let i = 0; i < 30; i++) {
                const key = answers[i];
                if (key) counts[key] = (counts[key]||0)+1;
            }
            let maxCount = 0;
            let dom = [];
            for (let [k,v] of Object.entries(counts)) {
                if (v > maxCount) { maxCount = v; dom = [k]; }
                else if (v === maxCount) dom.push(k);
            }
            return dom.map(k => psychotypeMap[k] || k).join(' + ');
        }

        function getSubclassKeys() {
            const counts = {};
            for (let i = 30; i < 40; i++) {
                const key = answers[i];
                if (key) counts[key] = (counts[key]||0)+1;
            }
            let max = 0;
            let dom = [];
            for (let [k,v] of Object.entries(counts)) {
                if (v > max) { max = v; dom = [k]; }
                else if (v === max) dom.push(k);
            }
            return dom;
        }

        function getSubclassForClass(cls, dominantKeys) {
            const map = subclassMap[cls];
            if (!map) return map.default;
            let candidates = [];
            dominantKeys.forEach(k => {
                if (map[k]) candidates = candidates.concat(map[k]);
            });
            if (candidates.length === 0) return map.default;
            return [...new Set(candidates)].join(' / ');
        }

        function showResults() {
            quizArea.style.display = 'none';
            resultContainer.style.display = 'block';
            classScores = calculateClassScores();
            const maxScore = Math.max(...Object.values(classScores));
            const topClasses = classNames.filter(c => classScores[c] === maxScore);

            if (topClasses.length === 1) {
                selectedClass = topClasses[0];
                displayFinalResult();
            } else {
                // tiebreaker: let user choose
                classNameDisplay.textContent = 'Выбери свой путь:';
                subclassDisplay.textContent = '';
                psychotypeDisplay.textContent = getDominantPsychotype();
                tiebreakerArea.innerHTML = '<p>Несколько классов набрали равное количество баллов:</p><div class="multiple-classes"></div>';
                const btnsDiv = tiebreakerArea.querySelector('.multiple-classes');
                topClasses.forEach(cls => {
                    const btn = document.createElement('button');
                    btn.textContent = cls;
                    btn.addEventListener('click', () => {
                        initAudio(); playClick();
                        selectedClass = cls;
                        displayFinalResult();
                    });
                    btnsDiv.appendChild(btn);
                });
                classIconDiv.innerHTML = '';
            }
        }

        function displayFinalResult() {
            if (!selectedClass) return;
            const icon = createPixelIcon(selectedClass);
            classIconDiv.innerHTML = '';
            classIconDiv.appendChild(icon);
            classNameDisplay.textContent = selectedClass;
            const subKeys = getSubclassKeys();
            const sub = getSubclassForClass(selectedClass, subKeys);
            subclassDisplay.textContent = 'Подкласс: ' + sub;
            psychotypeDisplay.textContent = 'Психотип: ' + getDominantPsychotype();
            tiebreakerArea.innerHTML = '';
        }

        function restartQuiz() {
            answers = new Array(totalQuestions).fill(null);
            currentQuestionIndex = 0;
            selectedClass = null;
            quizArea.style.display = 'block';
            resultContainer.style.display = 'none';
            renderQuestion();
        }

        // Navigation
        prevBtn.addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
                initAudio(); playClick();
            }
        });
        nextBtn.addEventListener('click', () => {
            if (currentQuestionIndex < totalQuestions-1) {
                currentQuestionIndex++;
                renderQuestion();
                initAudio(); playClick();
            } else if (currentQuestionIndex === totalQuestions-1) {
                // finish
                initAudio(); playClick();
                showResults();
            }
        });
        restartBtn.addEventListener('click', restartQuiz);

        // Initial render
        renderQuestion();
    })();
</script>
